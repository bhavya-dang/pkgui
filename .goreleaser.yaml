version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: pkgui
    dir: ./cmd/pkgui
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"

brews:
  - repository:
      owner: bhavya-dang
      name: homebrew-pkgui
      token: "{{ .Env.GH_PAT }}"
    directory: Formula
    homepage: "https://github.com/bhavya-dang/pkgui"
    description: "terminal dashboard for everything you've installed"
    license: "MIT"
    dependencies:
      - name: git
